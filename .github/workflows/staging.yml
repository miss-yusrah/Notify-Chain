name: Staging Deployment
on:
  push:
    branches:
      - staging
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          cd listener
          npm ci
          npm run build
      - run: |
          cd dashboard
          npm ci
          npm run build
      - run: |
          bash scripts/health-check.sh http://localhost:3000/health
